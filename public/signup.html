<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To.Me ; From.Me - 회원가입</title>
    
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#151f2e">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 배경이 짤리지 않게 높이 고정 */
        html {
            height: 100%;
            background: linear-gradient(to bottom, #151f2e 0%, #1e2d3f 20%, #2a3a4d 40%, #3d4b5a 55%, #5a5a5a 68%, #766652 78%, #9a8568 86%, #b89a73 93%, #d4b08a 100%) no-repeat fixed;
        }
        body { margin: 0; background: transparent !important; }

        /* 🔥 처음에 투명하게 숨김 (JS로 페이드인 하기 위해) */
        .title, .input-field, .btn, .back-link, .check-btn, #idMsg {
            opacity: 0; 
        }

        /* ✅ 아이디 입력 그룹 - 상대 위치 */
        .input-group {
            position: relative;
            width: 100%;
        }

        /* ✅ 아이디 입력창 - 오른쪽에 버튼 공간 확보 */
        .input-group .username-input {
            width: 100%;
            padding-right: 115px;
        }

        /* ✅ 중복확인 버튼 - 입력창 안쪽 오른쪽에 작게 */
        .check-btn {
            position: absolute;
            right: 5px;
            transform: translateY(-50%);
            width: 100px;
            padding: 12px 0;
            font-size: 14px;
            background: rgba(90, 90, 90, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 52px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .check-btn:hover {
            background: rgba(118, 102, 82, 0.9);
            border-color: rgba(205, 154, 99, 0.5);
        }

        @media (max-width: 768px) {
            .input-group .username-input {
                padding-right: 100px;
            }
            .check-btn {
                width: 85px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .input-group .username-input {
                padding-right: 90px;
            }
            .check-btn {
                width: 75px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <h1 class="title">
            <span class="to">To.Me</span><span class="semicolon"> ; </span><span class="from">From.Me</span>
        </h1>
        
        <div class="form-container">
            <input type="text" id="name" class="input-field" placeholder="이름 (최대 10자)" maxlength="10">
            
            <div class="input-group">
                <input type="text" id="username" class="input-field username-input" placeholder="아이디 (영어, 숫자 / 최대 20자)" maxlength="20">
                <button type="button" id="checkBtn" class="check-btn">중복확인</button>
            </div>
            <p id="idMsg"></p>

            <input type="password" id="password" class="input-field" placeholder="비밀번호 (최대 20자)" maxlength="20">
            
            <button id="registerBtn" class="btn submit-btn">회원가입</button>
        </div>
        
        <a href="hello.html" class="back-link">← 돌아가기</a>
    </div>

    <script>
        // ==========================================
        // 1. 별 생성 및 배경 효과
        // ==========================================
        const starsContainer = document.getElementById('stars');
        const starCount = 180;

        class Star {
            constructor() {
                this.element = document.createElement('div');
                this.element.className = 'star';
                this.x = Math.random() * 100;
                this.y = Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.6 + 0.3;
                this.duration = Math.random() * 3 + 2;
                
                this.element.style.left = this.x + '%';
                this.element.style.top = this.y + '%';
                this.element.style.width = this.size + 'px';
                this.element.style.height = this.size + 'px';
                this.element.style.opacity = this.opacity;
                this.element.style.animation = `twinkle ${this.duration}s ease-in-out infinite`; 
                this.element.style.animationDelay = Math.random() * 3 + 's';
                
                if (starsContainer) {
                    starsContainer.appendChild(this.element);
                }
            }
        }
        
        if (starsContainer) {
            for (let i = 0; i < starCount; i++) { new Star(); }
        }

        // ==========================================
        // 2. 페이지 등장 애니메이션 (페이드인)
        // ==========================================
        function playEnterAnimation() {
            const title = document.querySelector('.title'); 
            // 회원가입 페이지에 있는 요소들 (중복확인 버튼 포함)
            const elements = document.querySelectorAll('.input-field, .check-btn, #idMsg, .submit-btn, .back-link');
            
            // (1) 타이틀 등장
            if (title) {
                title.style.opacity = '0';
                title.style.transform = 'translateY(50px)';
                title.style.transition = 'all 1.4s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    title.style.opacity = '1';
                    title.style.transform = 'translateY(0)';
                }, 100);
            }
            
            // (2) 나머지 요소들 순차 등장
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(40px)';
                el.style.transition = 'all 1.2s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 300 + (index * 200)); 
            });

            attachInputEvents();
        }

        // 입력창 포커스 효과
        function attachInputEvents() {
            document.querySelectorAll('.input-field').forEach(input => {
                input.style.transition = 'all 0.3s ease-out';
                input.addEventListener('focus', function() {
                    this.style.transform = 'scale(1.02)';
                    this.style.boxShadow = '0 4px 20px rgba(212, 165, 116, 0.3)';
                    this.style.background = 'rgba(255, 255, 255, 0.65)';
                });
                input.addEventListener('blur', function() {
                    this.style.transform = 'scale(1)';
                    this.style.boxShadow = 'none';
                    this.style.background = 'rgba(255, 255, 255, 0.5)';
                });
            });
        }

        // 화면 로드 시 애니메이션 실행
        window.addEventListener('load', () => {
            playEnterAnimation();
        });

        // ==========================================
        // 3. 회원가입 기능 (기존 로직 유지)
        // ==========================================
        let isIdChecked = false;
        const idInput = document.getElementById("username");
        const msgBox = document.getElementById("idMsg");

        // 아이디 입력값이 바뀌면 중복확인 초기화
        idInput.addEventListener("input", () => {
            isIdChecked = false;
            msgBox.innerText = "";
        });

        // 3-1. 중복 확인
        document.getElementById("checkBtn").addEventListener("click", async () => {
            const inputVal = idInput.value;

            if (!inputVal) {
                alert("아이디를 입력하세요.");
                return;
            }

            try {
                const response = await fetch("/check-username", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userid: inputVal }), 
                });

                const result = await response.json();

                if (result.available) {
                    msgBox.innerText = result.message;
                    msgBox.style.color = "#81c784";
                    isIdChecked = true;
                } else {
                    msgBox.innerText = result.message;
                    msgBox.style.color = "#ff8a80";
                    isIdChecked = false;
                }
            } catch (err) {
                console.error(err);
                alert("서버 연결 오류");
            }
        });

        // 3-2. 회원가입 요청
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const name = document.getElementById("name").value;
            const userid = idInput.value;
            const password = document.getElementById("password").value;

            if (!name || !userid || !password) {
                alert("모든 정보를 입력해주세요.");
                return;
            }

            if (!isIdChecked) {
                alert("아이디 중복 확인을 해주세요.");
                return;
            }

            try {
                const response = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, userid, password }),
                });

                const result = await response.json();

                if (response.ok) {
                    alert("가입 성공! 로그인 페이지로 이동합니다.");
                    window.location.href = "login.html";
                } else {
                    alert(result.message);
                }
            } catch (err) {
                console.error(err);
                alert("서버 오류가 발생했습니다.");
            }
        });
    </script>
</body>
</html>
