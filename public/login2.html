<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To.Me ; From.Me - 로그인</title>

   

    <meta name="color-scheme" content="dark">

    <meta name="theme-color" content="#151f2e">

    <link rel="stylesheet" href="css/style.css">

    <style>

        /* 로그인 페이지 전용 스타일 보정 (필요시 사용) */

    html {

    height: 100%;

    background: linear-gradient(

            to bottom,

             #c59292 0%,

             #f7bfae 30%,

             #e7c2a6 55%,

             #cab390 75%,

             #c8b590 100%

            ) no-repeat fixed;

        }

        body {

    margin: 0;

    height: 100%;

    background-image:

        radial-gradient(white 1px, transparent 1px),

        linear-gradient(

            to bottom,

            #f6b1b1 0%,

            #f7bfae 30%,

            #f8caa7 55%,

            #f6d3a0 75%,

            #f3d8a3 100%

        );

    background-size: 3px 3px, cover;

    margin: 0; background: transparent !important;

}



.title .to {

    color: #ffffff; /* 밝은 흰색 */

}



.title .semicolon {

    color: rgba(255, 255, 255, 0.6); /* 은은하게 */

}



.title .from {

    color: #8d6e63; /* 브라운 핑크 느낌 */

}



#loginBtn{

    background-color: #662B2C80;

}

#signBtn{

    background-color: #662B2C80;

}

</style>

</head>

<body>

    <div class="stars" id="stars"></div>

   

    <div class="container">

        <h1 class="title">



            <span class="to">To.Me</span><span class="semicolon"> ; </span><span class="from">From.Me</span>

        </h1>

       

        <div class="form-container">

            <button id="loginBtn" class="btn submit-btn">로그인</button>

            <button id="signBtn" class="btn submit-btn">회원가입</button>



        </div>

    </div>



    <script>

        const starsContainer = document.getElementById('stars');

        for (let i = 0; i < 200; i++) {

            const star = document.createElement('div');

            star.className = 'star';

            star.style.top = `${Math.random() * 100}%`;

            star.style.left = `${Math.random() * 100}%`;

            star.style.animationDelay = `${Math.random() * 4}s`;

            starsContainer.appendChild(star);

        }

    </script>



    <script>

     

    </script>

</body>

</html>
