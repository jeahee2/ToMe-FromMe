<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To.Me ; From.Me</title>
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#151f2e">
    <style>
        @font-face {
            font-family: 'PyeojinGothic';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'PyeojinGothic';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'PyeojinGothic';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: linear-gradient(to bottom,
                #151f2e 0%, #1e2d3f 20%, #2a3a4d 40%, #3d4b5a 55%,
                #5a5a5a 68%, #766652 78%, #9a8568 86%, #b89a73 93%, #d4b08a 100%
            );
            min-height: 100vh;
        }

        body {
            font-family: 'PyeojinGothic', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: transparent;
        }

        /* 별 애니메이션 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }

        /* 상단 타이틀 */
        .top-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 300;
            z-index: 10;
            filter: drop-shadow(0 0 8px rgba(255, 252, 223, 0.3));
            
            /* 🔥 애니메이션 초기값 */
            opacity: 0;
        }

        .top-title .to { color: #cd9a63; }
        .top-title .semicolon { color: #ffffff; margin: 0 8px; }
        .top-title .from { color: #f0ebe0; }

        /* 메인 컨텐츠 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            height: 100vh;
            padding-left: 150px;
        }

        /* 환영 메시지 */
        .welcome-text {
            font-size: 64px;
            font-weight: 400;
            line-height: 1.2;
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 252, 223, 0.3));
            margin-bottom: 5px;
            
            /* 🔥 애니메이션 초기값 */
            opacity: 0;
        }

        .welcome-text .username { color: #E6C395; }

        /* 질문 텍스트 */
        .question-text {
            font-size: 50px;
            font-weight: 350;
            background: linear-gradient(to right, #f5f0ea, #e1d5c5);
            filter: drop-shadow(0 0 8px rgba(250, 248, 230, 0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            transition: opacity 0.8s ease-in-out;
            margin-bottom: 80px;

            /* 🔥 애니메이션 초기값 */
            opacity: 0;
        }

        /* 페이드 효과 (질문 변경용) */
        .fade-out { opacity: 0 !important; }
        .fade-in { opacity: 1 !important; }

        /* 구분선 */
        .divider {
            width: 400px;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            margin-bottom: 80px;

            /* 🔥 애니메이션 초기값 */
            opacity: 0;
        }

        /* 버튼 */
        .create-btn {
            width: 480px;
            padding: 22px 0;
            font-size: 32px;
            background: rgba(72, 56, 41, 0.64);
            border: none;
            border-radius: 52px;
            color: #FFEACD;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 0 12px 2px rgba(255, 252, 223, 0.15);
            font-weight: 400;

            /* 🔥 애니메이션 초기값 */
            opacity: 0;
        }

        .create-btn:hover {
            background: rgba(72, 56, 41, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 0 18px 3px rgba(255, 252, 223, 0.25);
        }

        .create-btn:active { transform: translateY(0); }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .container { padding-left: 40px; padding-right: 40px; }
            .top-title { font-size: 24px; top: 30px; }
            .welcome-text { font-size: 40px; }
            .question-text { font-size: 27px; margin-bottom: 50px; }
            .divider { width: 100%; margin-bottom: 50px; }
            .create-btn { width: 100%; font-size: 24px; }
        }

        @media (max-width: 480px) {
            .container { padding-left: 30px; padding-right: 30px; }
            .top-title { font-size: 20px; }
            .welcome-text { font-size: 32px; }
            .question-text { font-size: 28px; margin-bottom: 45px; }
            .divider { margin-bottom: 45px; }
            .create-btn { font-size: 20px; padding: 18px 0; }
        }
    </style>
</head>

<body>
    <div class="stars" id="stars"></div>

    <div class="top-title">
        <span class="to">To.Me</span><span class="semicolon">;</span><span class="from">From.Me</span>
    </div>

    <div class="container">
        <div class="welcome-text">
            반가워요. <span class="username" id="username">Guest</span>님
        </div>

        <div class="question-text" id="randomQuestion">내년의 나에게 꼭 지키고 싶은 약속 하나는?</div>

        <div class="divider"></div>

        <button class="create-btn" id="createBtn">To. me</button>
    </div>

    <script>
        // ==========================================
        // 1. 별 생성 (예쁜 별로 업그레이드)
        // ==========================================
        const starsContainer = document.getElementById('stars');
        const starCount = 180;

        class Star {
            constructor() {
                this.element = document.createElement('div');
                this.element.className = 'star';
                this.x = Math.random() * 100;
                this.y = Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.6 + 0.3;
                this.duration = Math.random() * 3 + 2;
                
                this.element.style.left = this.x + '%';
                this.element.style.top = this.y + '%';
                this.element.style.width = this.size + 'px';
                this.element.style.height = this.size + 'px';
                this.element.style.opacity = this.opacity;
                this.element.style.animation = `twinkle ${this.duration}s ease-in-out infinite`; 
                this.element.style.animationDelay = Math.random() * 3 + 's';
                
                if (starsContainer) {
                    starsContainer.appendChild(this.element);
                }
            }
        }
        
        if (starsContainer) {
            for (let i = 0; i < starCount; i++) { new Star(); }
        }

        // ==========================================
        // 2. 페이지 등장 애니메이션 (페이드인)
        // ==========================================
        function playEnterAnimation() {
            const title = document.querySelector('.top-title');
            // 순서대로 나타날 요소들 (환영인사, 질문, 구분선, 버튼)
            const elements = document.querySelectorAll('.welcome-text, .question-text, .divider, .create-btn');
            
            // (1) 상단 타이틀 등장
            if (title) {
                title.style.transform = 'translateY(-20px) translateX(-50%)'; // 원래 translateX 유지
                title.style.transition = 'all 1.4s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    title.style.opacity = '1';
                    title.style.transform = 'translateY(0) translateX(-50%)';
                }, 100);
            }
            
            // (2) 본문 내용 순차 등장
            elements.forEach((el, index) => {
                el.style.transform = 'translateY(40px)';
                el.style.transition = 'all 1.2s cubic-bezier(0.22, 1, 0.36, 1)';
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 400 + (index * 250)); // 0.25초 간격으로 하나씩 올라옴
            });
        }

        // ==========================================
        // 3. 기능 로직 (유저 이름, 질문 변경)
        // ==========================================
        
        // 페이지 로드 시 실행
        window.addEventListener('load', async () => {
            // 애니메이션 시작
            playEnterAnimation();

            // 이름 가져오기
            try {
                const response = await fetch("/get-user-info");
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("username").textContent = data.name;
                }
            } catch (err) {
                console.error("이름 불러오기 실패:", err);
            }
        });

        // 질문 리스트
        const questions = [
            '내년의 나에게 꼭 지키고 싶은 약속 하나는?',
            '지금의 나에게 해주고 싶은 가장 고마운 말은?',
            '지금 이 시기를 한 단어로 남긴다면?',
            '지금의 나에게 가장 필요한 문장은?',
            '미래의 나에게 해주고 싶은 말은?',
            '그동안 가장 많이 달라진 건 무엇일까?',
            '지금의 내가 응원해주고 싶은 말은?',
            '미래의 내가 과거의 나에게 남기고 싶은 말은?',
            '미래의 나는 어떻게 변하였을까?',
            '미래에 나에게 부탁하고 싶은 것은?'
        ];

        let currentIndex = 0;
        const questionElement = document.getElementById('randomQuestion');

        // 질문 변경 함수 (페이드 아웃 -> 인)
        function changeQuestion() {
            // 이미 투명도 1인 상태에서 클래스로 조절
            questionElement.classList.remove('fade-in');
            questionElement.classList.add('fade-out');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                questionElement.textContent = questions[currentIndex];
                
                questionElement.classList.remove('fade-out');
                questionElement.classList.add('fade-in');
            }, 800);
        }

        // 4초마다 질문 변경
        setInterval(changeQuestion, 4000);

        // 버튼 클릭
        document.getElementById('createBtn').addEventListener('click', () => {
            window.location.href = 'write.html';
        });
    </script>
</body>

</html>
