<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To.Me ; From.Me</title>
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#151f2e">

<style>
@font-face {
    font-family: 'PyeojinGothic';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Light.woff2') format('woff2');
    font-weight: 300;
}
@font-face {
    font-family: 'PyeojinGothic';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Regular.woff2') format('woff2');
    font-weight: 400;
}
@font-face {
    font-family: 'PyeojinGothic';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2504-1@1.0/PyeojinGothic-Bold.woff2') format('woff2');
    font-weight: 700;
}

*{margin:0;padding:0;box-sizing:border-box;}

html{
    background: linear-gradient(to bottom,
        #151f2e 0%, #1e2d3f 20%, #2a3a4d 40%, #3d4b5a 55%,
        #5a5a5a 68%, #766652 78%, #9a8568 86%, #b89a73 93%, #d4b08a 100%
    );
    min-height:100vh;
}

body{
    font-family:'PyeojinGothic','Malgun Gothic',sans-serif;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* 별 */
.stars{position:absolute;width:100%;height:100%;z-index:0;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 4s infinite;}
@keyframes twinkle{
    0%,100%{opacity:.3;transform:scale(1);}
    50%{opacity:.9;transform:scale(1.3);}
}

/* 로고 (1파일이랑 동일 톤) */
.top-title{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    font-weight:300;
    z-index:10;
}
.top-title .to{color:#cd9a63;}
.top-title .semicolon{color:#fff;margin:0 8px;}
.top-title .from{color:#f0ebe0;}

/* 중앙 */
.wrapper{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:1;
}

.question{
    font-size:48px;
    font-weight:400;
    color:#e9dcc6;
    margin-bottom:30px; /* 🔥 버튼이랑 더 가깝게 */
    text-shadow:0 0 12px rgba(255,252,223,.35);
}

.btn-group{
    display:flex;
    gap:28px;
}

.btn{
    width:240px;
    height:68px;
    border-radius:50px;
    font-size:28px;
    font-family:inherit;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.25);
    transition:.3s;
}

/* 아니오 */
.btn.no{
    background:rgba(255,255,255,.08);
    color:#f2efe8;
    backdrop-filter:blur(6px);
}
.btn.no:hover{
    background:rgba(255,255,255,.16);
}

/* 예 */
.btn.yes{
    background:linear-gradient(135deg,#e7cfa1,#cfa874);
    color:#2b1e10;
    border:none;
    box-shadow:0 0 16px rgba(231,207,161,.45);
}
.btn.yes:hover{
    transform:translateY(-2px);
    box-shadow:0 0 24px rgba(231,207,161,.7);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="top-title">
    <span class="to">To.Me</span><span class="semicolon">;</span><span class="from">From.Me</span>
</div>

<div class="wrapper">
    <div class="question" id="qText">편지를 저장하시겠습니까?</div>

    <div class="btn-group" id="btnGroup">
        <button class="btn no" onclick="goNo()">아니요</button>
        <button class="btn yes" onclick="goYes()">예</button>
    </div>
</div>

<script>
/* 별 생성 */
const stars=document.getElementById('stars');
for(let i=0;i<180;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.width=s.style.height=(Math.random()*2+0.5)+'px';
    s.style.animationDuration=(Math.random()*3+2)+'s';
    stars.appendChild(s);
}

/* 등장 애니메이션 (간단 버전) */
window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('qText').style.opacity = '1', 100);
    setTimeout(() => document.getElementById('btnGroup').style.opacity = '1', 400);
});

/* 버튼 기능 */
function goNo(){
    // 취소하면 다시 메인(hello.html)으로
    window.location.href="hello.html";
}

async function goYes(){
    const content = sessionStorage.getItem("draftLetter");
    const videoUrl = sessionStorage.getItem("draftVideoUrl");

    if (!content && !videoUrl) {
        alert("작성된 편지 내용이 없습니다.");
        window.location.href = "write.html";
        return;
    }

    const body = content
        ? { type: "text", content }
        : { type: "video", videoUrl };

    try {
        const response = await fetch("/write-letter", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });

        const result = await response.json();

        if (response.ok) {
            sessionStorage.removeItem("draftLetter");
            sessionStorage.removeItem("draftVideoUrl");
            window.location.href = "origami.html";
        } else {
            alert(result.message || "오류가 발생했습니다.");
            if (response.status === 401) window.location.href = "login.html";
        }
    } catch (err) {
        console.error(err);
        alert("서버 연결 오류");
    }
}
</script>

</body>
</html>
